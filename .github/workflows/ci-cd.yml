name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '21'
  IMAGE_NAME: currency-converter-kotlin

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: currency_converter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/currency_converter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          SPRING_DATA_REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-for-ci-must-be-at-least-32-chars
          CURRENCY_API_KEY: test_api_key_for_ci
        run: ./gradlew test --no-daemon

      - name: Run Detekt (lint)
        run: ./gradlew detekt --no-daemon

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7

  # ── Job 2: Build Docker image ─────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Save Docker image
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ── Job 3: Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://kotlin-converter.duckdns.org

    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Copy image and scripts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "image.tar.gz,docker-compose.prod.yml,nginx/,scripts/"
          target: "/home/${{ secrets.DEPLOY_USER }}/currency-converter-kotlin"

      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DB_USER,DB_PASSWORD,JWT_SECRET,CURRENCY_API_KEY
          script: |
            cd /home/${{ secrets.DEPLOY_USER }}/currency-converter-kotlin

            # ── Write .env.production first so rollback also has it ──
            cat > .env.production << ENVEOF
            SPRING_PROFILES_ACTIVE=prod
            POSTGRES_USER=${{ secrets.DB_USER }}
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            POSTGRES_DB=currency_converter
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CURRENCY_API_KEY=${{ secrets.CURRENCY_API_KEY }}
            ENVEOF

            # ── Obtain SSL cert if not already present ──
            CERT_PATH="/etc/letsencrypt/live/kotlin-converter.duckdns.org/fullchain.pem"
            if [ ! -f "$CERT_PATH" ]; then
              echo "🔐 SSL cert not found — obtaining via certbot..."
              # Stop nginx if running so port 80 is free for certbot standalone
              docker compose -f docker-compose.prod.yml --env-file .env.production stop nginx 2>/dev/null || true
              sudo apt-get install -y certbot
              sudo certbot certonly --standalone --non-interactive --agree-tos \
                -m ${{ secrets.DEPLOY_EMAIL }} \
                -d kotlin-converter.duckdns.org
              echo "✅ SSL cert obtained."
            else
              echo "✅ SSL cert already exists, skipping certbot."
            fi

            # ── Save current image for rollback ──
            docker tag currency-converter-kotlin:latest currency-converter-kotlin:rollback 2>/dev/null || true

            echo "📦 Loading new image..."
            docker load < image.tar.gz

            echo "🚀 Starting containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --no-build

            # ── Poll Docker healthcheck (up to 240s; start_period=30s + retries=5x10s = 80s max to unhealthy) ──
            echo "⏳ Waiting for app container to become healthy (up to 240s)..."
            ELAPSED=0
            MAX_WAIT=240
            RETRY_INTERVAL=10
            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' currency-converter-app 2>/dev/null || echo "missing")
              RUNNING=$(docker inspect --format='{{.State.Running}}' currency-converter-app 2>/dev/null || echo "false")
              echo "  Container status: $STATUS | running: $RUNNING (${ELAPSED}s elapsed)"
              if [ "$STATUS" = "healthy" ]; then break; fi
              if [ "$STATUS" = "unhealthy" ] || [ "$RUNNING" = "false" ]; then
                echo "  ⚠️  Container stopped or unhealthy — dumping logs:"
                docker logs --tail=100 currency-converter-app || true
                break
              fi
              sleep "$RETRY_INTERVAL"
              ELAPSED=$((ELAPSED + RETRY_INTERVAL))
            done

            # ── Always dump logs on non-healthy outcome ──
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' currency-converter-app 2>/dev/null || echo "missing")
            if [ "$STATUS" != "healthy" ]; then
              echo "❌ Container never became healthy (final status: $STATUS)"
              echo "📋 Full app logs (last 100 lines):"
              docker logs --tail=100 currency-converter-app || true
              echo "📋 docker inspect:"
              docker inspect currency-converter-app || true
              echo "🔄 Rolling back..."
              docker compose -f docker-compose.prod.yml --env-file .env.production down || true
              docker tag currency-converter-kotlin:rollback currency-converter-kotlin:latest 2>/dev/null || true
              docker compose -f docker-compose.prod.yml --env-file .env.production up -d --no-build || true
              exit 1
            fi

            # ── Final HTTP health check ──
            echo "🏥 HTTP health check..."
            RESPONSE=$(curl -sf http://localhost:8080/api/v1/actuator/health || true)
            echo "  Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"status":"UP"'; then
              echo "✅ Deploy successful!"
              docker image prune -f
              exit 0
            fi

            echo "❌ HTTP health check failed. Logs:"
            docker logs --tail=50 currency-converter-app || true
            docker compose -f docker-compose.prod.yml --env-file .env.production down || true
            docker tag currency-converter-kotlin:rollback currency-converter-kotlin:latest 2>/dev/null || true
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --no-build || true
            exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "🎉 Deployed to http://143.198.21.206:8080"
          echo "📌 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"

  # ── Job 4: Rollback manual ────────────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /home/${{ secrets.DEPLOY_USER }}/currency-converter-kotlin

            echo "🔄 Rolling back to previous image..."
            docker compose -f docker-compose.prod.yml --env-file .env.production down
            docker tag currency-converter-kotlin:rollback currency-converter-kotlin:latest
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --no-build

            echo "⏳ Waiting for rollback container to become healthy (up to 120s)..."
            ELAPSED=0
            while [ "$ELAPSED" -lt 120 ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' currency-converter-app 2>/dev/null || echo "missing")
              echo "  Container status: $STATUS (${ELAPSED}s elapsed)"
              if [ "$STATUS" = "healthy" ]; then break; fi
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done

            RESPONSE=$(curl -sf http://localhost:8080/api/v1/actuator/health || true)
            if echo "$RESPONSE" | grep -q '"status":"UP"'; then
              echo "✅ Rollback successful!"
            else
              echo "❌ Rollback health check failed!"
              exit 1
            fi





