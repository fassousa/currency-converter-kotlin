version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currency-converter-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DATABASE_URL=jdbc:postgresql://db:5432/currency_converter
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379
      - SERVER_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production-min-32-chars}
      - CURRENCY_API_KEY=${CURRENCY_API_KEY:-}
      - CURRENCY_API_BASE_URL=${CURRENCY_API_BASE_URL:-https://api.currencyapi.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - currency-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: currency-converter-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-currency_converter}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - currency-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: currency-converter-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - currency-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  currency-network:
    driver: bridge

