# HTTP → HTTPS redirect
server {
    listen 80;
    server_name kotlin-converter.duckdns.org;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name kotlin-converter.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/kotlin-converter.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kotlin-converter.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy para o Spring Boot
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Swagger UI — sem cache
    location /api/v1/swagger-ui/ {
        proxy_pass         http://app:8080;
        proxy_set_header   Host $host;
        add_header         Cache-Control "no-cache, no-store";
    }
}


