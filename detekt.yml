# Detekt configuration for currency-converter-kotlin
# Builds upon the default Detekt rule set; only overrides are listed here.

performance:
  SpreadOperator:
    # runApplication<App>(*args) is the idiomatic Spring Boot Kotlin entry point.
    # The spread operator here is unavoidable and the array is always tiny (CLI args).
    active: false

complexity:
  LongParameterList:
    # JPA @Entity primary constructors map one parameter per database column.
    # TransactionJpaEntity has 9 columns — suppressing the threshold at the rule
    # level avoids @Suppress noise on every JPA entity in the project.
    constructorThreshold: 10
