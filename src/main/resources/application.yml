spring:
  application:
    name: currency-converter

  # JPA/Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  # Datasource configuration (using environment variables)
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:testdb}
    username: ${POSTGRES_USER:sa}
    password: ${POSTGRES_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Flyway migration configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    out-of-order: false

  # Redis configuration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 60000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Cache configuration
  cache:
    type: redis
    redis:
      time-to-live: 600000

  # Jackson configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    context-path: /api/v1

# SpringDoc/Swagger configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: list
    try-it-out-enabled: true
  use-fqn: true
  show-actuator: true

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging configuration (default - will be overridden by profiles)
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.fintech: ${LOGGING_LEVEL_COM_FINTECH:INFO}
    org.springframework.web: ${LOGGING_LEVEL_SPRING_WEB:INFO}
    org.hibernate: ${LOGGING_LEVEL_HIBERNATE:WARN}
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Application-specific settings
app:
  jwt:
    secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC0zMmJ5dGU=}
    expiration: ${JWT_EXPIRATION:86400000}
  currency-api:
    url: ${CURRENCY_API_URL:https://api.exchangeratesapi.io/v1}
    api-key: ${CURRENCY_API_KEY:change-me}

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      exchangeRates:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      exchangeRates:
        max-attempts: 3
        wait-duration: 500ms

